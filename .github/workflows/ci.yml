name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Check formatting
        run: python -m ruff format --check .

      - name: Lint
        run: python -m ruff check .

      - name: Verify v1 contract lock (no drift)
        run: python -m scripts.generate_v1_lock --check

      - name: Verify v2 JSON schemas (no drift)
        run: python -m scripts.generate_v2_schemas --check

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install TS deps
        run: bun install --frozen-lockfile

      - name: Verify TS client (no drift)
        run: bun run --cwd packages/ts/api-client check

      - name: Typecheck TS
        run: bun run --cwd packages/ts/api-client typecheck

      - name: Test
        run: pytest -q

      - name: Build Docker image
        run: docker build -t health-data-hub-ci .
