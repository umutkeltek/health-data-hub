# HealthSave bundled Mosquitto broker configuration.
#
# Profile-gated (`mosquitto`) тАФ opt-in alongside the `home-assistant`
# profile so a single `docker compose --profile mosquitto --profile
# home-assistant up -d` brings up the broker AND the HA-MQTT bridge
# pointing at it.
#
# Default posture is single-user-homelab-LAN: anonymous allowed,
# persistence enabled, logs to stdout for `docker compose logs`.
#
# To require authentication (recommended for multi-host or any
# non-LAN exposure), set MOSQUITTO_PASSWORD_FILE in the env and
# overlay a compose override that sets `allow_anonymous false` +
# `password_file /mosquitto/config/passwd`.

listener 1883

# Default open on the LAN-bound docker bridge. Override in a
# docker-compose.override.yml for hardened deployments.
allow_anonymous true

# Persist queued + retained messages across restarts so HA does not
# lose the last-published health snapshot on a `docker compose
# restart mqtt`.
persistence true
persistence_location /mosquitto/data/
autosave_interval 60

# Stream to docker logs in addition to a file inside the container
# (the file lets `mosquitto_sub -h ...` debugging dump history; the
# stdout target makes `docker compose logs mqtt` useful).
log_dest stdout
log_dest file /mosquitto/log/mosquitto.log
log_type notice
log_type warning
log_type error

# Connection limits тАФ single-user broker, modest defaults.
max_connections -1
max_inflight_messages 40
max_queued_messages 1000
