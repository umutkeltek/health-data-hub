# datahub reverse proxy — durable per-IP rate limiting (SECURITY-004).
#
# Mounted at /etc/nginx/conf.d/default.conf, so the directives below run inside
# the stock image's `http {}` block. This is the *gateway* rate limit the app's
# in-process body/batch/export caps cannot provide (per-IP, survives restarts,
# applies before the request reaches the API).
#
# Two per-IP zones: a general API zone and a tighter ingest/webhook zone. State
# is keyed on $binary_remote_addr — put a real client IP here. If you front this
# with Cloudflare/another proxy, use the real-IP module so the limit keys on the
# end client, not the upstream proxy (see the commented real_ip block).

limit_req_zone  $binary_remote_addr zone=api:10m     rate=10r/s;
limit_req_zone  $binary_remote_addr zone=ingest:10m  rate=2r/s;
limit_conn_zone $binary_remote_addr zone=conn:10m;
limit_req_status 429;
limit_conn_status 429;

# If a trusted proxy (Cloudflare, an LB) sits in front, restore the real client
# IP so rate limits key on the end user. Uncomment + set your proxy's ranges:
# real_ip_header X-Forwarded-For;
# set_real_ip_from 0.0.0.0/0;   # tighten to your proxy's CIDR

upstream datahub_api {
    server api:8000;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    # Match the app's 16 MiB body cap so oversized bodies are rejected here too.
    client_max_body_size 16m;
    limit_conn conn 20;

    # Proxy headers (inherited by all locations below).
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_read_timeout 300s;   # generous: SSE narration streams + slow LLM reads

    # Liveness/readiness: never rate-limited (monitoring + orchestrator probes).
    location = /health     { proxy_pass http://datahub_api; }
    location = /api/health { proxy_pass http://datahub_api; }
    location = /ready      { proxy_pass http://datahub_api; }

    # Ingest hot path — tight per-IP limit (the live iOS device bursts, so allow
    # a burst but throttle abuse).
    location = /api/apple/batch {
        limit_req zone=ingest burst=10 nodelay;
        proxy_pass http://datahub_api;
    }

    # Internet-facing webhook (Whoop) — tight limit; HMAC is verified by the app.
    location /api/v2/sources/whoop/webhook {
        limit_req zone=ingest burst=5 nodelay;
        proxy_pass http://datahub_api;
    }

    # Everything else (reads, v2 API).
    location / {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://datahub_api;
        # SSE note: for streaming endpoints (e.g. v2 narration), add a dedicated
        # location with `proxy_buffering off;` once that surface ships (R4).
    }
}

# ---------------------------------------------------------------------------
