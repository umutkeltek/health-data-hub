services:
  db:
    image: ${TIMESCALE_IMAGE:-timescale/timescaledb:2.17.2-pg16}
    restart: unless-stopped
    environment:
      POSTGRES_DB: healthsave
      POSTGRES_USER: healthsave
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthsave"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    command: ["python", "-m", "scripts.migrate"]
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://healthsave:${DB_PASSWORD:-changeme}@db:5432/healthsave

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+asyncpg://healthsave:${DB_PASSWORD:-changeme}@db:5432/healthsave
      API_KEY: ${API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      LLM_API_KEY: ${LLM_API_KEY:-}
      HDH_TOKEN_ENC_KEY: ${HDH_TOKEN_ENC_KEY:-}
      WHOOP_CLIENT_ID: ${WHOOP_CLIENT_ID:-}
      WHOOP_CLIENT_SECRET: ${WHOOP_CLIENT_SECRET:-}
      WHOOP_REDIRECT_URI: ${WHOOP_REDIRECT_URI:-}
      WHOOP_POLL_CRON: ${WHOOP_POLL_CRON:-}
      AMAZFIT_APP_TOKEN: ${AMAZFIT_APP_TOKEN:-}
      AMAZFIT_USER_ID: ${AMAZFIT_USER_ID:-}
      AMAZFIT_REGION: ${AMAZFIT_REGION:-us}
      AMAZFIT_POLL_CRON: ${AMAZFIT_POLL_CRON:-}
      # Analysis job enable overrides (analysis.config._JOB_ENABLE_ENV). The
      # mounted config.yaml is read-only/wiped on redeploy, so .env is the
      # deploy-survivable enable switch. Unset → falls back to the YAML value.
      ANALYSIS_DAILY_BRIEFING_ENABLED: ${ANALYSIS_DAILY_BRIEFING_ENABLED:-}
      ANALYSIS_WEEKLY_SUMMARY_ENABLED: ${ANALYSIS_WEEKLY_SUMMARY_ENABLED:-}
      ANALYSIS_ANOMALY_DETECTION_ENABLED: ${ANALYSIS_ANOMALY_DETECTION_ENABLED:-}
      ANALYSIS_TREND_ANALYSIS_ENABLED: ${ANALYSIS_TREND_ANALYSIS_ENABLED:-}
      ANALYSIS_CORRELATION_ANALYSIS_ENABLED: ${ANALYSIS_CORRELATION_ANALYSIS_ENABLED:-}
      ANALYSIS_RECOVERY_ENABLED: ${ANALYSIS_RECOVERY_ENABLED:-}
    volumes:
      - ${ANALYSIS_CONFIG_FILE:-./config.yaml.example}:/app/config.yaml:ro
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Worker — runs the AnalysisScheduler decoupled from the API process.
  # API uptime is no longer coupled to scheduler bugs/memory/experiments.
  # Same image as api; different command. Single replica per deployment.
  worker:
    build: .
    command: ["python", "-m", "worker.main"]
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+asyncpg://healthsave:${DB_PASSWORD:-changeme}@db:5432/healthsave
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      LLM_API_KEY: ${LLM_API_KEY:-}
      HDH_TOKEN_ENC_KEY: ${HDH_TOKEN_ENC_KEY:-}
      WHOOP_CLIENT_ID: ${WHOOP_CLIENT_ID:-}
      WHOOP_CLIENT_SECRET: ${WHOOP_CLIENT_SECRET:-}
      WHOOP_REDIRECT_URI: ${WHOOP_REDIRECT_URI:-}
      WHOOP_POLL_CRON: ${WHOOP_POLL_CRON:-}
      AMAZFIT_APP_TOKEN: ${AMAZFIT_APP_TOKEN:-}
      AMAZFIT_USER_ID: ${AMAZFIT_USER_ID:-}
      AMAZFIT_REGION: ${AMAZFIT_REGION:-us}
      AMAZFIT_POLL_CRON: ${AMAZFIT_POLL_CRON:-}
      # Analysis job enable overrides — the scheduler reads these (see api).
      ANALYSIS_DAILY_BRIEFING_ENABLED: ${ANALYSIS_DAILY_BRIEFING_ENABLED:-}
      ANALYSIS_WEEKLY_SUMMARY_ENABLED: ${ANALYSIS_WEEKLY_SUMMARY_ENABLED:-}
      ANALYSIS_ANOMALY_DETECTION_ENABLED: ${ANALYSIS_ANOMALY_DETECTION_ENABLED:-}
      ANALYSIS_TREND_ANALYSIS_ENABLED: ${ANALYSIS_TREND_ANALYSIS_ENABLED:-}
      ANALYSIS_CORRELATION_ANALYSIS_ENABLED: ${ANALYSIS_CORRELATION_ANALYSIS_ENABLED:-}
      ANALYSIS_RECOVERY_ENABLED: ${ANALYSIS_RECOVERY_ENABLED:-}
    volumes:
      - ${ANALYSIS_CONFIG_FILE:-./config.yaml.example}:/app/config.yaml:ro

  # Agents (Phase 7-C) — runs the autonomous agent supervisor.
  # Loads `agents.enabled[]` from config.yaml and ticks each plugin at
  # its configured interval. Empty allowlist by default — opt-in only.
  # No port exposed; counters increment in-process. Same image as api/worker.
  #
  # Profile-gated (`agents`): not started by default because autonomous agent
  # loops should be an explicit operator choice. With the default empty
  # `agents.enabled` allowlist, the service idles; enable concrete agent ids in
  # config.yaml before running `docker compose --profile agents up -d agents`.
  agents:
    build: .
    command: ["python", "-m", "agents.main"]
    restart: unless-stopped
    profiles: ["agents"]
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+asyncpg://healthsave:${DB_PASSWORD:-changeme}@db:5432/healthsave
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      LLM_API_KEY: ${LLM_API_KEY:-}
    volumes:
      - ${ANALYSIS_CONFIG_FILE:-./config.yaml.example}:/app/config.yaml:ro

  # Bundled MQTT broker — opt-in via the `mosquitto` profile so users
  # who already run their own broker (or a homelab Mosquitto) are not
  # forced into a duplicate one. Default posture is single-user LAN:
  # anonymous allowed, persistence enabled, logs to stdout. See
  # deploy/mosquitto/mosquitto.conf for the conf; override that file
  # via a compose override to harden auth for non-LAN deployments.
  #
  # Service name is `mqtt` so the HA bridge's default
  # HA_MQTT_BROKER=mqtt resolves through the docker DNS without env
  # overrides. Host port 1883 is published so an external Home
  # Assistant on the same LAN can connect by host IP.
  mqtt:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    profiles: ["mosquitto"]
    volumes:
      - ./deploy/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt_data:/mosquitto/data
      - mqtt_log:/mosquitto/log
    ports:
      - "${MOSQUITTO_PORT:-1883}:1883"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "mosquitto_sub -h localhost -t '$$SYS/broker/uptime' -C 1 -W 3 || exit 1"
      interval: 15s
      timeout: 5s
      retries: 3

  # Home Assistant MQTT bridge — optional, independent of Grafana.
  # Publishes retained MQTT discovery + state topics (`healthsave_*`) so
  # Home Assistant dashboards/automations do not need direct DB access.
  homeassistant-mqtt:
    build: .
    command: ["python", "-m", "homeassistant_mqtt.main"]
    restart: unless-stopped
    profiles: ["home-assistant"]
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+asyncpg://healthsave:${DB_PASSWORD:-changeme}@db:5432/healthsave
      HA_MQTT_ENABLED: ${HA_MQTT_ENABLED:-false}
      HA_MQTT_BROKER: ${HA_MQTT_BROKER:-mqtt}
      HA_MQTT_PORT: ${HA_MQTT_PORT:-1883}
      HA_MQTT_USERNAME: ${HA_MQTT_USERNAME:-}
      HA_MQTT_PASSWORD: ${HA_MQTT_PASSWORD:-}
      HA_MQTT_DISCOVERY_PREFIX: ${HA_MQTT_DISCOVERY_PREFIX:-homeassistant}
      HA_MQTT_STATE_TOPIC_PREFIX: ${HA_MQTT_STATE_TOPIC_PREFIX:-healthsave}
      HA_MQTT_DEVICE_IDENTIFIER: ${HA_MQTT_DEVICE_IDENTIFIER:-healthsave}
      HA_MQTT_DEVICE_NAME: ${HA_MQTT_DEVICE_NAME:-HealthSave}
      HA_MQTT_LEGACY_STATE_TOPIC_PREFIX: ${HA_MQTT_LEGACY_STATE_TOPIC_PREFIX:-}
      HA_MQTT_LEGACY_DEVICE_IDENTIFIER: ${HA_MQTT_LEGACY_DEVICE_IDENTIFIER:-}
      HA_MQTT_LEGACY_DEVICE_NAME: ${HA_MQTT_LEGACY_DEVICE_NAME:-}
      HA_MQTT_PUBLISH_INTERVAL_SECONDS: ${HA_MQTT_PUBLISH_INTERVAL_SECONDS:-60}

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana-oss:11.2.0}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      HDH_GRAFANA_DATASOURCE_URL: ${HDH_GRAFANA_DATASOURCE_URL:-db:5432}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-changeme}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"

volumes:
  db_data:
  grafana_data:
  mqtt_data:
  mqtt_log:
