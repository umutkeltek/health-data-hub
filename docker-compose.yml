services:
  db:
    image: ${TIMESCALE_IMAGE:-timescale/timescaledb:2.17.2-pg16}
    restart: unless-stopped
    environment:
      POSTGRES_DB: healthsave
      POSTGRES_USER: healthsave
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthsave"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    command: ["python", "-m", "scripts.migrate"]
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://healthsave:${DB_PASSWORD:-changeme}@db:5432/healthsave

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+asyncpg://healthsave:${DB_PASSWORD:-changeme}@db:5432/healthsave
      API_KEY: ${API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      LLM_API_KEY: ${LLM_API_KEY:-}
    volumes:
      - ${ANALYSIS_CONFIG_FILE:-./config.yaml.example}:/app/config.yaml:ro
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Worker — runs the AnalysisScheduler decoupled from the API process.
  # API uptime is no longer coupled to scheduler bugs/memory/experiments.
  # Same image as api; different command. Single replica per deployment.
  worker:
    build: .
    command: ["python", "-m", "worker.main"]
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+asyncpg://healthsave:${DB_PASSWORD:-changeme}@db:5432/healthsave
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      LLM_API_KEY: ${LLM_API_KEY:-}
    volumes:
      - ${ANALYSIS_CONFIG_FILE:-./config.yaml.example}:/app/config.yaml:ro

  # Agents (Phase 7-C) — runs the autonomous agent supervisor.
  # Loads `agents.enabled[]` from config.yaml and ticks each plugin at
  # its configured interval. Empty allowlist by default — opt-in only.
  # No port exposed; counters increment in-process. Same image as api/worker.
  #
  # Profile-gated (`agents`): not started by default because (a) Phase 7-C is
  # still landing — the Dockerfile does not yet COPY apps/agents/agents/ into
  # /app/, so `python -m agents.main` raises ModuleNotFoundError on boot, and
  # (b) the supervisor is LLM-bound and apps-vm intentionally runs with
  # LLM_PROVIDER=disabled (no GPU). The intended home is a GPU host (fedora-pc
  # + Ollama) reached over LAN. Re-enable explicitly with
  # `docker compose --profile agents up -d agents` once both blockers are
  # cleared.
  agents:
    build: .
    command: ["python", "-m", "agents.main"]
    restart: unless-stopped
    profiles: ["agents"]
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+asyncpg://healthsave:${DB_PASSWORD:-changeme}@db:5432/healthsave
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      LLM_API_KEY: ${LLM_API_KEY:-}
    volumes:
      - ${ANALYSIS_CONFIG_FILE:-./config.yaml.example}:/app/config.yaml:ro

  # Home Assistant MQTT bridge — optional, independent of Grafana.
  # Publishes retained MQTT discovery + state topics (`healthtrack_*`) so
  # Home Assistant dashboards/automations do not need direct DB access.
  homeassistant-mqtt:
    build: .
    command: ["python", "-m", "homeassistant_mqtt.main"]
    restart: unless-stopped
    profiles: ["home-assistant"]
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+asyncpg://healthsave:${DB_PASSWORD:-changeme}@db:5432/healthsave
      HA_MQTT_ENABLED: ${HA_MQTT_ENABLED:-false}
      HA_MQTT_BROKER: ${HA_MQTT_BROKER:-mqtt}
      HA_MQTT_PORT: ${HA_MQTT_PORT:-1883}
      HA_MQTT_USERNAME: ${HA_MQTT_USERNAME:-}
      HA_MQTT_PASSWORD: ${HA_MQTT_PASSWORD:-}
      HA_MQTT_DISCOVERY_PREFIX: ${HA_MQTT_DISCOVERY_PREFIX:-homeassistant}
      HA_MQTT_STATE_TOPIC_PREFIX: ${HA_MQTT_STATE_TOPIC_PREFIX:-healthtrack}
      HA_MQTT_DEVICE_IDENTIFIER: ${HA_MQTT_DEVICE_IDENTIFIER:-healthtrack_owl}
      HA_MQTT_DEVICE_NAME: ${HA_MQTT_DEVICE_NAME:-HealthTrack}
      HA_MQTT_PUBLISH_INTERVAL_SECONDS: ${HA_MQTT_PUBLISH_INTERVAL_SECONDS:-60}

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana-oss:11.2.0}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-changeme}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"

volumes:
  db_data:
  grafana_data:
